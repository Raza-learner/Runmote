name: Flutter CI

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/**
      - src/flutter_app/**
  pull_request:

jobs:
  analyze-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: src/flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env from template
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/flutter_app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env from template
        run: cp .env.example .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/flutter_app/build/app/outputs/flutter-apk/app-debug.apk
