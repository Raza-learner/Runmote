name: Scripts (Windows)

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/*.ps1
  pull_request:

jobs:
  validate-ps:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        run: |
          Get-ChildItem scripts -Filter *.ps1 -Recurse | ForEach-Object {
            Write-Host "Validating $_"
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$errors
            )
            if ($errors.Count -gt 0) {
              Write-Error "$_ has $($errors.Count) syntax errors"
              foreach ($e in $errors) { Write-Error $e.Message }
              exit 1
            }
            Write-Host "  OK"
          }
