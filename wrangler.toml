name = "runmote"
main = "worker.js"
compatibility_date = "2026-07-10"

# Routes
#   runmote.dev/install.sh       -> main branch
#   runmote.dev/install          -> main branch
#   runmote.dev/install.sh/dev   -> dev branch
#   runmote.dev/install/dev      -> dev branch

# Keep Render free-tier relays awake (sleep after 15 min inactivity)
[triggers]
crons = ["*/13 * * * *"]
