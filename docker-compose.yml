

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    container_name: acp-relay
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - acp-relay-data:/data
    environment:
      ACP_RELAY_HOST: "0.0.0.0"
      ACP_RELAY_PORT: "8000"
      ACP_RELAY_DB: "/data/acp_relay.db"
      # Uncomment to enable daemon auth:
      # ACP_RELAY_TOKEN: "your-secret-token"

volumes:
  acp-relay-data:
