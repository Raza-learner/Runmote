# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: acp-relay
    env: docker
    dockerfilePath: Dockerfile.relay
    healthCheckPath: /health
    disk:
      name: data
      mountPath: /data
    envVars:
      - key: ACP_RELAY_HOST
        value: 0.0.0.0
      - key: ACP_RELAY_PORT
        value: "8000"
      - key: ACP_RELAY_DB
        value: /data/acp_relay.db
      - key: ACP_RELAY_DISABLE_DISCOVERY
        value: "true"
      - key: ACP_RELAY_TOKEN
        sync: false
